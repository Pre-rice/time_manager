name: frontend
description: "Time Manager - 个人时间管理助手"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.13.0-270.0.dev

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 路由
  go_router: ^14.6.2

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # JSON 序列化
  json_annotation: ^4.9.0

  # 本地存储
  shared_preferences: ^2.3.4

  # 工具
  intl: ^0.19.0
  table_calendar: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true