services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: time_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/time_manager"
      DATABASE_URL_SYNC: "postgresql://postgres:postgres@postgres:5432/time_manager"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production"
      ENCRYPTION_KEY: "dev-encryption-key-32-bytes-long!!"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # volumes:
    #   - .:/app  # 注释掉，使用镜像内构建的版本

volumes:
  pgdata: